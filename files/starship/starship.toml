# general
scan_timeout = 800  # default 30
command_timeout = 1000  # default 500
add_newline = false

#format = '$all'
format = """
[¯éÂ](#9A348E)\
$username\
$hostname\
[¯é░](bg:#DA627D fg:#9A348E)\
$directory\
[¯é░](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[¯é░](fg:#FCA17D bg:#06969A)\
$docker_context\
$kubernetes\
[¯é░](fg:#06969A bg:#86BBD8)\
$python\
$package\
$all\
[¯é░](fg:#86BBD8 bg:#33658A)\
$line_break\
$memory_usage\
$time\
$os\
$status\
$sudo\
[¯é░ ](fg:#33658A)\
$character\
"""

# directory
[directory]
disabled = false
truncation_length = 4
truncation_symbol = '.../'
truncate_to_repo = true
format = '[$path]($style)[$read_only]($read_only_style)'
#format = ':[$path]($style)[$read_only]($read_only_style)/'
style = "bg:#DA627D"

# docker_context
[docker_context]
disabled = false
format = '[­ƒÉ│$context]($style)'
style = "bg:#06969A"

# git
[git_branch]
#format = ' [$symbol$branch(:$remote_branch)]($style) '
format = '[$symbol$branch(:$remote_branch)]($style)'
style = "bg:#FCA17D"

[git_status]
style = "bg:#FCA17D"
format = '[$all_status$ahead_behind ]($style)'

# hostname
[hostname]
ssh_only = false
ssh_symbol = '­ƒîÉ' #space trimmed
format = '[@$ssh_symbol$hostname]($style)'
style = "bg:#9A348E"

# kubernetes
[kubernetes]
disabled = false
#format = '\[[$symbol($user):($cluster):$context\(($namespace)\)]($style)\]'
#format = '[\[$symbol($user):($cluster):$context\(($namespace)\)\]]($style)'
format = '[\[$symbol:$context\(($namespace)\)\]]($style)'
style = "bg:#06969A"
detect_extensions = [ 'yaml', 'yml' ]
detect_env_vars = [ 'INVALID' ] #v1.19 bug workaround https://github.com/starship/starship/issues/5978
#detect_files = [ '*\.ya?ml', 'kustomization.yaml', 'kustomization.yml' ]
[[kubernetes.contexts]]
context_pattern = '.*dev-k8s.*'
user_pattern = '(.*admin.*|.*oidc-.*)'
style = 'white bold bg:#06969A'
#style = 'dimmed yellow bold'
##symbol = "¯ü×µ¿ù"
[[kubernetes.contexts]]
context_pattern = '.*tst-k8s.*'
user_pattern = '(.*admin.*|.*oidc-.*)'
style = 'white bold bg:#A6A80A'
##symbol = "¯ü×µ¿ù"
[[kubernetes.contexts]]
context_pattern = '.*prd-k8s.*'
user_pattern = '(.*admin.*|.*oidc-.*)'
style = 'white bold bg:#A6363A'
symbol = "¯ü×µ¿ù"
[[kubernetes.contexts]]
context_pattern = '(kind|k3s|k3d).*local.*'
user_pattern = '.*'
style = 'white bold bg:#06369A'

# line_break
[line_break]
disabled = false

# memory_usage
[memory_usage]
disabled = false
threshold = 50
format  = '[$symbol$ram|$swap]($style)'
style = "bg:#33658A"

# OS
[os]
disabled = false
format = '[$symbol]($style)'
style = "bg:#33658A"

# sudo
[sudo]
disabled = false
format = '[$symbol]($style)'
style = "bg:#33658A"

# status
[status]
disabled = false
format  = '[$symbol$status]($style)'
style = "bg:#33658A"

# time
[time]
disabled = false
#format = '\[[$time]($style)\]'
format = '[ÔÖÑ\[$time\]]($style)'
#time_format = "%R" # Hour:Minute Format
style = "bg:#33658A"

# username
[username]
show_always = true
format = '[$user]($style)'
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
disabled = false

# character
[character]
disabled = true


